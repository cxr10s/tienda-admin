<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin</title>
    <link rel="icon" type="image/svg+xml" href="icon-admin.svg">
    <link rel="apple-touch-icon" href="icon-admin.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface2: #1a1a1a;
            --border: #222;
            --accent: #c8ff00;
            --accent2: #ff6b35;
            --text: #f0f0f0;
            --muted: #666;
            --pendiente: #f59e0b;
            --enviado: #3b82f6;
            --entregado: #22c55e;
            --cancelado: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            font-variant-numeric: lining-nums tabular-nums;
        }

        /* ── LOGIN ── */
        #login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 50% 0%, #1a2a00 0%, #0a0a0a 70%);
            padding: 20px;
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-logo {
            font-size: 13px;
            font-family: 'Space Mono', monospace;
            color: var(--accent);
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        .login-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 28px;
        }

        .login-field {
            position: relative;
            margin-bottom: 14px;
            text-align: left;
        }

        .login-field label {
            display: block;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 7px;
        }

        .login-field input {
            width: 100%;
            padding: 13px 15px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .login-field input:focus { border-color: var(--accent); }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .login-btn:hover    { opacity: 0.85; }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .login-error { color: #ef4444; font-size: 12px; margin-top: 12px; display: none; }

        /* ── DASHBOARD ── */
        #dashboard { display: none; }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-logo {
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--accent);
            letter-spacing: 3px;
            font-weight: 700;
        }

        .topbar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-fecha {
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--muted);
        }

        .logout-btn {
            padding: 7px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logout-btn:hover { border-color: var(--cancelado); color: var(--cancelado); }

        .main {
            padding: 28px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── STATS ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            transition: border-color 0.2s;
        }
        .stat-card:hover { border-color: #333; }

        .stat-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            font-family: 'Space Mono', monospace;
            line-height: 1;
        }
        .stat-value.accent { color: var(--accent); }
        .stat-value.orange { color: var(--accent2); }
        .stat-value.blue   { color: #3b82f6; }
        .stat-value.green  { color: #22c55e; }
        .stat-value.gold   { color: #f59e0b; }

        .stat-value.small  { font-size: 18px; }

        /* ── TOOLBAR ── */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 7px 16px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .filter-pago-btn {
            padding: 7px 14px;
            border-radius: 100px;
            border: 1px solid rgba(34,197,94,0.3);
            background: transparent;
            color: #22c55e;
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-pago-btn.active, .filter-pago-btn:hover {
            background: rgba(34,197,94,0.15);
        }

        .toolbar-right {
            display: flex;
            gap: 8px;
            margin-left: auto;
            flex-wrap: wrap;
        }

        .icon-btn {
            padding: 7px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

        .search-input {
            padding: 7px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            outline: none;
            width: 200px;
            transition: border 0.2s;
        }
        .search-input:focus { border-color: var(--accent); }

        /* ── TABLE ── */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .table-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .table-title { font-size: 14px; font-weight: 700; }

        .pedidos-count {
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--muted);
        }

        .table-scroll { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        thead th {
            padding: 11px 18px;
            text-align: left;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            cursor: pointer;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--surface2); }

        tbody td {
            padding: 14px 18px;
            font-size: 13px;
            vertical-align: middle;
        }

        .td-id {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted);
        }
        .td-nombre { font-weight: 700; font-size: 13px; }
        .td-email  { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .td-total  { font-weight: 700; color: var(--accent); }
        .td-fecha  { font-size: 11px; color: var(--muted); }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .badge-pendiente { background: rgba(245,158,11,0.15); color: var(--pendiente); }
        .badge-enviado   { background: rgba(59,130,246,0.15); color: var(--enviado); }
        .badge-entregado { background: rgba(34,197,94,0.15);  color: var(--entregado); }
        .badge-cancelado { background: rgba(239,68,68,0.15);  color: var(--cancelado); }
        .badge-pagado    { background: rgba(34,197,94,0.15);  color: #22c55e; }

        .badge-pago {
            display: inline-block;
            padding: 3px 9px;
            border-radius: 100px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .badge-pago-pagado    { background: rgba(34,197,94,0.12);   color: #22c55e; border:1px solid rgba(34,197,94,0.2); }
        .badge-pago-pendiente { background: rgba(245,158,11,0.12);  color: #f59e0b; border:1px solid rgba(245,158,11,0.2); }
        .badge-pago-cancelado { background: rgba(239,68,68,0.12);   color: #ef4444; border:1px solid rgba(239,68,68,0.2); }
        .badge-pago-error     { background: rgba(239,68,68,0.12);   color: #ef4444; border:1px solid rgba(239,68,68,0.2); }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.82);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-overlay.show { display: flex; }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            width: 100%;
            max-width: 560px;
            max-height: 92vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 18px;
            right: 18px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s;
        }
        .modal-close:hover { border-color: var(--accent); color: var(--accent); }

        .modal-title { font-size: 19px; font-weight: 800; margin-bottom: 2px; padding-right: 36px; }
        .modal-id    { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 22px; }

        .modal-section { margin-bottom: 20px; }

        .modal-section-title {
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .modal-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .modal-info-item {
            background: var(--surface2);
            border-radius: 10px;
            padding: 12px 14px;
        }

        .modal-info-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-bottom: 4px; }
        .modal-info-value { font-size: 13px; font-weight: 700; word-break: break-all; }

        .modal-product {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--surface2);
            border-radius: 10px;
            margin-bottom: 6px;
        }
        .modal-product-name { font-size: 13px; font-weight: 600; }
        .modal-product-qty  { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .modal-product-price { font-size: 13px; color: var(--accent); font-weight: 700; }

        .modal-totals {
            border-top: 1px solid var(--border);
            margin-top: 10px;
            padding-top: 12px;
        }
        .modal-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .modal-total-row.final {
            font-size: 15px;
            font-weight: 800;
            color: var(--accent);
            padding-top: 8px;
            border-top: 1px solid var(--border);
            margin-top: 6px;
        }

        .modal-estado-wrap {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .estado-btn {
            flex: 1;
            min-width: 90px;
            padding: 9px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .estado-btn[data-estado="pendiente"]:hover,
        .estado-btn[data-estado="pendiente"].active  { background: rgba(245,158,11,0.15); color: var(--pendiente); border-color: var(--pendiente); }
        .estado-btn[data-estado="enviado"]:hover,
        .estado-btn[data-estado="enviado"].active    { background: rgba(59,130,246,0.15);  color: var(--enviado);   border-color: var(--enviado); }
        .estado-btn[data-estado="entregado"]:hover,
        .estado-btn[data-estado="entregado"].active  { background: rgba(34,197,94,0.15);   color: var(--entregado); border-color: var(--entregado); }
        .estado-btn[data-estado="cancelado"]:hover,
        .estado-btn[data-estado="cancelado"].active  { background: rgba(239,68,68,0.15);   color: var(--cancelado); border-color: var(--cancelado); }

        /* Botones bloqueados — no disponibles para el admin */
        .estado-btn.locked {
            opacity: 0.25;
            cursor: not-allowed;
            pointer-events: none;
        }
        .estado-btn.locked::after {
            content: ' 🔒';
            font-size: 10px;
        }

        /* ── BOTONES MODAL FOOTER ── */
        .modal-footer-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 14px;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            text-align: center;
        }
        .modal-btn-factura {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .modal-btn-factura:hover { border-color: var(--accent); color: var(--accent); }

        .modal-btn-whatsapp {
            background: rgba(37,211,102,0.1);
            border: 1px solid rgba(37,211,102,0.3);
            color: #25d366;
        }
        .modal-btn-whatsapp:hover { background: rgba(37,211,102,0.2); }

        /* ── LOADING / EMPTY ── */
        .loading {
            text-align: center;
            padding: 56px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 12px;
        }

        .empty {
            text-align: center;
            padding: 56px;
            color: var(--muted);
        }
        .empty i  { font-size: 42px; margin-bottom: 14px; opacity: 0.2; }
        .empty p  { font-size: 13px; }

        /* ── TOAST ── */
        #admin-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a1a;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 22px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            z-index: 9999;
            transition: transform 0.35s ease, opacity 0.35s ease;
            opacity: 0;
            white-space: nowrap;
            pointer-events: none;
        }
        #admin-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .main { padding: 16px; }
            .topbar { padding: 0 16px; }
            .topbar-fecha { display: none; }
            .toolbar-right { margin-left: 0; width: 100%; }
            .search-input { width: 100%; }
            .modal-info-grid { grid-template-columns: 1fr; }
            .modal-footer-btns { grid-template-columns: 1fr; }
            .modal-estado-wrap { gap: 6px; }
            .topbar-title { display: none; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .stat-value { font-size: 22px; }
            .stat-value.small { font-size: 14px; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">Shop</div>
        <h1 class="login-title">Panel Admin</h1>
        <div class="login-field">
            <label>USUARIO</label>
            <input type="text" id="admin-user" placeholder="admin" autocomplete="off"
                   onkeydown="if(event.key==='Enter') document.getElementById('admin-pass').focus()">
        </div>
        <div class="login-field">
            <label>CONTRASEÑA</label>
            <input type="password" id="admin-pass" placeholder="••••••••"
                   onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <button class="login-btn" id="login-btn" onclick="doLogin()">Entrar</button>
        <div class="login-error" id="login-error">Usuario o contraseña incorrectos</div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="topbar">
        <div class="topbar-left">
            <span class="topbar-logo">Shop</span>
            <span class="topbar-title">/ Admin</span>
        </div>
        <div class="topbar-right">
            <span id="topbar-fecha" class="topbar-fecha"></span>
            <button class="logout-btn" onclick="doLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> Salir
            </button>
        </div>
    </div>

    <div class="main">
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">TOTAL PEDIDOS</div>
                <div class="stat-value accent" id="stat-total">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">PENDIENTES</div>
                <div class="stat-value orange" id="stat-pendientes">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">ENVIADOS</div>
                <div class="stat-value blue" id="stat-enviados">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">ENTREGADOS</div>
                <div class="stat-value green" id="stat-entregados">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">INGRESOS PAGADOS</div>
                <div class="stat-value gold small" id="stat-ingresos">—</div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <button class="filter-btn active" onclick="setFiltro('todos', this)">Todos</button>
            <button class="filter-btn" onclick="setFiltro('pendiente', this)">Pendientes</button>
            <button class="filter-btn" onclick="setFiltro('pagado', this)">💳 Pagados</button>
            <button class="filter-btn" onclick="setFiltro('enviado', this)">Enviados</button>
            <button class="filter-btn" onclick="setFiltro('entregado', this)">Entregados</button>
            <button class="filter-btn" onclick="setFiltro('cancelado', this)">Cancelados</button>
            <div class="toolbar-right">
                <input class="search-input" type="text" placeholder="Buscar nombre, email o ID..." 
                       oninput="buscar(this.value)" id="search-input">
                <button class="icon-btn" onclick="cargarPedidos()">
                    <i class="fa-solid fa-rotate-right"></i> Actualizar
                </button>
                <button class="icon-btn" onclick="exportarCSV()">
                    <i class="fa-solid fa-download"></i> CSV
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <div class="table-header">
                <span class="table-title">Pedidos</span>
                <span class="pedidos-count" id="pedidos-count">cargando...</span>
            </div>
            <div class="table-scroll">
                <div id="table-body">
                    <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i>&nbsp; Cargando pedidos...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this) cerrarModal()">

// ── TOAST ──
function showToast(msg, color = '#c8ff00') {
    const t = document.getElementById('admin-toast');

    t.style.borderColor = color;
    t.classList.add('show');

// ── LOGIN — usa Supabase Auth ──
async function doLogin() {
    const u   = document.getElementById('admin-user').value.trim();
    const p   = document.getElementById('admin-pass').value.trim();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');

    if (!u || !p) {
        errEl.textContent = 'Completa usuario y contraseña.';
        errEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Verificando...';
    errEl.style.display = 'none';

    try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON
            },
            body: JSON.stringify({ email: u, password: p })
        });

        const data = await res.json();

        if (res.ok && data.access_token) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display    = 'block';
            actualizarFecha();
            cargarPedidos();
        } else {
            errEl.textContent = 'Usuario o contraseña incorrectos.';
            errEl.style.display = 'block';
        }
    } catch (e) {
        errEl.textContent = 'Error de conexión. Intenta de nuevo.';
        errEl.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
    }
}

function doLogout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display    = 'none';
    document.getElementById('admin-user').value = '';
    document.getElementById('admin-pass').value = '';
    todosLosPedidos = [];
}

function actualizarFecha() {
    document.getElementById('topbar-fecha').textContent =
        new Date().toLocaleDateString('es-CO', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

// ── SUPABASE ──
async function supabaseFetch(path, options = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: {
            'apikey': SUPABASE_ANON,
            'Authorization': `Bearer ${SUPABASE_ANON}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation',
            ...options.headers
        },
        ...options
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
}

// ── CARGAR PEDIDOS ──
async function cargarPedidos() {
    document.getElementById('table-body').innerHTML =
        '<div class="loading"><i class="fa-solid fa-spinner fa-spin"></i>&nbsp; Cargando pedidos...</div>';
    try {
        todosLosPedidos = await supabaseFetch('pedidos?order=created_at.desc&select=*');
        actualizarStats();
        renderTabla(pedidosFiltrados());
    } catch (e) {
        document.getElementById('table-body').innerHTML =
            '<div class="loading" style="color:#ef4444;">&#9888; Error al cargar pedidos</div>';
    }
}

function actualizarStats() {
    const p = todosLosPedidos;
    const ingresosPagados = p.filter(x => x.estado_pago === 'pagado').reduce((s, x) => s + Number(x.total), 0);
    document.getElementById('stat-total').textContent      = p.length;
    document.getElementById('stat-pendientes').textContent = p.filter(x => x.estado === 'pendiente').length;
    document.getElementById('stat-enviados').textContent   = p.filter(x => x.estado === 'enviado').length;
    document.getElementById('stat-entregados').textContent = p.filter(x => x.estado === 'entregado').length;
    document.getElementById('stat-ingresos').textContent   = '$' + fmt(ingresosPagados);
    // Actualizar counter de pagados si existe
    const elPag = document.getElementById('stat-pagados');
    if (elPag) elPag.textContent = p.filter(x => x.estado === 'pagado').length;
}

function pedidosFiltrados() {
    const q = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
    return todosLosPedidos.filter(p => {
        const matchFiltro = filtroActual === 'todos' || p.estado === filtroActual;
        const matchPago   = !filtroPagados || p.estado_pago === 'pagado';
        const matchSearch = !q
            || p.nombre.toLowerCase().includes(q)
            || p.email.toLowerCase().includes(q)
            || p.id.toLowerCase().includes(q)
            || p.id.substring(0,8).toLowerCase().includes(q);
        return matchFiltro && matchPago && matchSearch;
    });
}

function setFiltro(estado, btn) {
    filtroActual  = estado;
    filtroEntrega = null;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTabla(pedidosFiltrados());
}

function setFiltroEntrega(tipo, btn) {
    // Toggle: si ya estaba activo, desactivar
    if (filtroEntrega === tipo) {
        filtroEntrega = null;
        filtroActual  = 'todos';
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-btn').classList.add('active');
        renderTabla(pedidosFiltrados());
        return;
    }
    filtroEntrega = tipo;
    filtroActual  = 'todos';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Recogida y Domicilios: solo pagados (listos para despachar)
    const lista = todosLosPedidos.filter(p =>
        (p.tipo_entrega || 'tienda') === tipo && p.estado_pago === 'pagado'
    );
    renderTabla(lista);
}

function toggleFiltroPago(btn) {
    filtroPagados = !filtroPagados;
    btn.classList.toggle('active', filtroPagados);
    renderTabla(pedidosFiltrados());
}

function buscar(q) { renderTabla(pedidosFiltrados()); }

// ── RENDER TABLA ──
function renderTabla(pedidos) {
    document.getElementById('pedidos-count').textContent =
        `${pedidos.length} pedido${pedidos.length !== 1 ? 's' : ''}`;

    if (pedidos.length === 0) {
        document.getElementById('table-body').innerHTML = `
            <div class="empty">
                <div><i class="fa-solid fa-box-open"></i></div>
                <p>No hay pedidos en esta categoría</p>
            </div>`;
        return;
    }

    const rows = pedidos.map(p => {
        const fecha = new Date(p.created_at).toLocaleDateString('es-CO', {
            day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit'
        });
        const idCorto    = p.id.substring(0,8).toUpperCase();
        const estadoPago = p.estado_pago || 'pendiente';
        const labelPago  = estadoPago === 'pagado'    ? 'PAGADO'
                         : estadoPago === 'cancelado' ? 'CANCELADO'
                         : estadoPago === 'error'     ? 'RECHAZADO'
                         : 'PENDIENTE';

        return `
            <tr onclick="abrirModal('${p.id}')">
                <td class="td-id">${idCorto}</td>
                <td>
                    <div class="td-nombre">${p.nombre}</div>
                    <div class="td-email">${p.email}</div>
                    <div style="font-size:10px;color:#666;margin-top:2px;">
                        ${p.tipo_entrega === 'domicilio' ? '🚚 Domicilio' : '🏪 Recogida'}
                    </div>
                </td>
                <td class="td-total">$${fmt(p.total)} COP</td>
                <td><span class="badge badge-${p.estado}">${p.estado.toUpperCase()}</span></td>
                <td><span class="badge-pago badge-pago-${estadoPago}">${labelPago}</span></td>
                <td class="td-fecha">${fecha}</td>
            </tr>`;
    }).join('');

    document.getElementById('table-body').innerHTML = `
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>CLIENTE</th>
                    <th>TOTAL</th>
                    <th>ESTADO</th>
                    <th>PAGO</th>
                    <th>FECHA</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>`;
}

// ── MODAL DETALLE ──
function getAdminTimeline(p) {
    const tipoEntrega = p.tipo_entrega || 'tienda';
    const estado      = p.estado || 'pendiente';

    const pasosRecogida = [
        { key: 'pendiente',  icon: '🕐', label: 'RECIBIDO'  },
        { key: 'pagado',     icon: '💳', label: 'PAGADO'    },
        { key: 'entregado',  icon: '✅', label: 'ENTREGADO' },
    ];
    const pasosDomicilio = [
        { key: 'pendiente',  icon: '🕐', label: 'RECIBIDO'  },
        { key: 'pagado',     icon: '💳', label: 'PAGADO'    },
        { key: 'enviado',    icon: '🚚', label: 'EN CAMINO' },
        { key: 'entregado',  icon: '✅', label: 'ENTREGADO' },
    ];

    const pasos = tipoEntrega === 'domicilio' ? pasosDomicilio : pasosRecogida;
    const ordenRecogida  = { pendiente:0, pagado:1, entregado:2, cancelado:-1 };
    const ordenDomicilio = { pendiente:0, pagado:1, enviado:2, entregado:3, cancelado:-1 };
    const orden  = tipoEntrega === 'domicilio' ? ordenDomicilio : ordenRecogida;
    const actual = orden[estado] ?? 0;

    if (estado === 'cancelado') {
        return `<div style="text-align:center;padding:10px;color:#ef4444;font-weight:700;font-size:12px;letter-spacing:1px;background:rgba(239,68,68,0.06);border-radius:8px;">✕ PEDIDO CANCELADO</div>`;
    }

    const style = `display:flex;gap:0;margin:8px 0 4px;`;
    const stepStyle = `flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.5px;color:#555;position:relative;`;
    const dotStyle  = (done, cur) => `width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid ${done ? '#adff2f' : cur ? '#adff2f' : '#333'};background:${done ? '#adff2f' : 'transparent'};`;
    const lineStyle = (done) => `position:absolute;top:14px;left:50%;width:100%;height:2px;background:${done ? '#adff2f' : '#222'};z-index:0;`;

    return `<div style="${style}">
        ${pasos.map((paso, i) => {
            const done = i < actual;
            const cur  = i === actual;
            return `<div style="${stepStyle}">
                ${i < pasos.length - 1 ? `<div style="${lineStyle(done)}"></div>` : ''}
                <div style="${dotStyle(done, cur)};position:relative;z-index:1;">${done ? '✓' : paso.icon}</div>
                <div style="color:${done || cur ? '#adff2f' : '#555'};">${paso.label}</div>
            </div>`;
        }).join('')}
    </div>`;
}

function abrirModal(id) {
    const p = todosLosPedidos.find(x => x.id === id);
    if (!p) return;

    const fecha    = new Date(p.created_at).toLocaleString('es-CO');
    const idCorto  = p.id.substring(0,8).toUpperCase();
    const productos = Array.isArray(p.productos) ? p.productos : [];

    const productosHTML = productos.map(prod => `
        <div class="modal-product">
            <div>
                <div class="modal-product-name">${prod.name}${prod.isGift ? ' 🎁' : ''}</div>
                <div class="modal-product-qty">Cantidad: ${prod.quantity}</div>
            </div>
            <div class="modal-product-price">
                ${prod.isGift ? '<span style="color:#22c55e;">GRATIS</span>' : '$' + fmt(prod.price * prod.quantity) + ' COP'}
            </div>
        </div>`).join('');

    // Todos los estados visibles — los no disponibles tienen cursor:not-allowed
    const ep           = p.estado_pago || 'pendiente';
    const disponibles  = ep === 'pagado' ? ['pagado','enviado','entregado'] : ['pendiente','cancelado'];

    const estadoBtns = ['pendiente','cancelado','pagado','enviado','entregado'].map(e => {
        const activo = disponibles.includes(e);
        return `<button class="estado-btn ${p.estado === e ? 'active' : ''}"
            data-estado="${e}"
            style="${!activo ? 'cursor:not-allowed; opacity:0.4;' : ''}"
            ${activo ? `onclick="cambiarEstado('${p.id}', '${e}')"` : `title="No disponible"`}
            >${e.charAt(0).toUpperCase() + e.slice(1)}</button>`;
    }).join('');

    const pagoColor = ep === 'pagado'    ? '#22c55e'
                    : ep === 'cancelado' ? '#ef4444'
                    : ep === 'error'     ? '#ef4444'
                    : '#f59e0b';
    const pagoLabel = ep === 'pagado'    ? 'Pago confirmado'
                    : ep === 'cancelado' ? 'Pago cancelado'
                    : ep === 'error'     ? 'Pago rechazado'
                    : 'Pago pendiente';
    const pagoIcon  = ep === 'pagado'    ? '✅'
                    : ep === 'cancelado' ? '❌'
                    : ep === 'error'     ? '❌'
                    : '⏳';

    // Armar mensaje de WhatsApp
    const waLabel   = p.nombre.split(' ')[0];
    const waEstado  = p.estado === 'enviado' ? `Tu pedido #${idCorto} ya fue enviado. Pronto lo recibirás.` :
                      p.estado === 'entregado' ? `Tu pedido #${idCorto} ha sido entregado. ¡Gracias por tu compra!` :
                      `Te escribimos sobre tu pedido #${idCorto}.`;
    const waMsg     = encodeURIComponent(`Hola ${waLabel}, ${waEstado}`);
    const waPhone   = p.telefono ? `57${p.telefono.replace(/^0/, '')}` : WA_NUMBER;

    document.getElementById('modal-box').innerHTML = `
        <button class="modal-close" onclick="cerrarModal()">&#10005;</button>
        <div class="modal-title">${p.nombre}</div>
        <div class="modal-id">Pedido #${idCorto} &middot; ${fecha}</div>

        <!-- TIMELINE según tipo de entrega -->
        <div class="modal-section">
            <div class="modal-section-title">SEGUIMIENTO</div>
            ${getAdminTimeline(p)}
        </div>

        <!-- MENSAJE DE ESTADO -->
        ${ep !== 'pagado' ? `
        <div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:12px 14px;margin-bottom:1rem;font-size:13px;color:#f59e0b;">
            ⚠️ ${ep === 'cancelado' ? 'El usuario canceló el pedido. No se realizó ningún cobro.' : 'El usuario aún no ha pagado su pedido. La factura no está disponible.'}
        </div>` : ''}

        <div class="modal-section">
            <div class="modal-section-title">INFORMACIÓN DE CONTACTO</div>
            <div class="modal-info-grid">
                <div class="modal-info-item">
                    <div class="modal-info-label">TELÉFONO</div>
                    <div class="modal-info-value">${p.telefono}</div>
                </div>
                <div class="modal-info-item">
                    <div class="modal-info-label">EMAIL</div>
                    <div class="modal-info-value" style="font-size:12px;">${p.email}</div>
                </div>
                <div class="modal-info-item" style="grid-column:1/-1;">
                    <div class="modal-info-label">TIPO DE ENTREGA</div>
                    <div class="modal-info-value">
                        ${p.tipo_entrega === 'domicilio' ? '🚚 Envío a domicilio' : '🏪 Recogida en tienda — Calle 13 #25-66'}
                    </div>
                </div>
                ${p.tipo_entrega === 'domicilio' ? `
                <div class="modal-info-item" style="grid-column:1/-1;">
                    <div class="modal-info-label">DIRECCIÓN DE ENVÍO</div>
                    <div class="modal-info-value">${p.direccion_envio || p.direccion || '—'}</div>
                </div>` : ''}
                ${p.notas ? `<div class="modal-info-item" style="grid-column:1/-1;">
                    <div class="modal-info-label">NOTAS DEL CLIENTE</div>
                    <div class="modal-info-value" style="color:var(--muted); font-weight:400;">${p.notas}</div>
                </div>` : ''}
            </div>
        </div>

        <div class="modal-section">
            <div class="modal-section-title">PRODUCTOS</div>
            ${productosHTML}
            <div class="modal-totals">
                <div class="modal-total-row"><span>Subtotal</span><span>$${fmt(p.subtotal)} COP</span></div>
                ${p.descuento > 0 ? `<div class="modal-total-row" style="color:#22c55e;">
                    <span>Descuento</span><span>-$${fmt(p.descuento)} COP</span>
                </div>` : ''}
                <div class="modal-total-row">
                    <span>Envío</span><span>${p.tipo_entrega === 'tienda' ? '—' : (p.envio > 0 ? '$' + fmt(p.envio) + ' COP' : '¡Gratis!')}</span>
                </div>
                <div class="modal-total-row final">
                    <span>TOTAL</span><span>$${fmt(p.total)} COP</span>
                </div>
            </div>
        </div>

        <div class="modal-section">
            <div class="modal-section-title">ESTADO DEL PAGO</div>
            <div style="display:flex; align-items:center; gap:12px; padding:13px 15px; background:var(--surface2); border-radius:10px;">
                <span style="font-size:22px;">${pagoIcon}</span>
                <div>
                    <div style="font-weight:700; font-size:14px; color:${pagoColor};">${pagoLabel}</div>
                    <div style="font-size:10px; color:var(--muted); margin-top:2px; font-family:'Space Mono',monospace;">
                        estado_pago: ${ep}
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-section">
            <div class="modal-section-title">CAMBIAR ESTADO DEL PEDIDO</div>
            <div class="modal-estado-wrap">${estadoBtns}</div>
        </div>

        <div class="modal-footer-btns">
            <button class="modal-action-btn modal-btn-factura"
                onclick="generarFacturaPDF(todosLosPedidos.find(x=>x.id==='${p.id}'))">
                <i class="fa-solid fa-file-invoice"></i> Descargar Factura
            </button>
            <a class="modal-action-btn modal-btn-whatsapp"
                href="https://wa.me/${waPhone}?text=${waMsg}" target="_blank" rel="noopener">
                <i class="fa-brands fa-whatsapp"></i> Enviar por WhatsApp
            </a>
        </div>
    `;

    document.getElementById('modal-overlay').classList.add('show');
}

function cerrarModal() {
    document.getElementById('modal-overlay').classList.remove('show');
}

// ── CAMBIAR ESTADO ──
async function cambiarEstado(id, nuevoEstado) {
    const p = todosLosPedidos.find(x => x.id === id);
    if (!p) return;

    const ep = p.estado_pago || 'pendiente';

    // Pago confirmado → no se puede volver a pendiente ni cancelado
    if (ep === 'pagado' && (nuevoEstado === 'pendiente' || nuevoEstado === 'cancelado')) {
        showToast('⛔ No puedes asignar ese estado — protección al cliente', '#ef4444');
        return;
    }

    // Pago pendiente → solo se permite pendiente y cancelado
    if (ep !== 'pagado' && (nuevoEstado === 'pagado' || nuevoEstado === 'enviado' || nuevoEstado === 'entregado')) {
        showToast('⛔ No disponible — el pago aún no ha sido confirmado', '#ef4444');
        return;
    }
    try {
        await supabaseFetch(`pedidos?id=eq.${id}`, {
            method: 'PATCH',
            body: JSON.stringify({ estado: nuevoEstado })
        });
        if (p) p.estado = nuevoEstado;

        document.querySelectorAll('.estado-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.estado === nuevoEstado);
        });

        actualizarStats();
        renderTabla(pedidosFiltrados());
        showToast('Estado actualizado: ' + nuevoEstado.toUpperCase(), '#c8ff00');
    } catch (e) {
        showToast('Error al cambiar estado', '#ef4444');
    }
}

// ── EXPORTAR CSV ──
function exportarCSV() {
    const pedidos = pedidosFiltrados();
    if (pedidos.length === 0) { showToast('No hay pedidos para exportar', '#f59e0b'); return; }

    const cols = ['ID','Nombre','Email','Telefono','Direccion','Total','Estado','Pago','Fecha'];
    const rows = pedidos.map(p => [
        p.id.substring(0,8),
        p.nombre,
        p.email,
        p.telefono,
        `"${p.direccion}"`,
        p.total,
        p.estado,
        p.estado_pago || 'pendiente',
        new Date(p.created_at).toLocaleDateString('es-CO')
    ].join(','));

    const csv = [cols.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `pedidos_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`${pedidos.length} pedidos exportados`, '#c8ff00');
}
